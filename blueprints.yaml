name: Smart Interlinker
slug: smart-interlinker
type: plugin
version: 0.2.7
description: SEO-driven internal linking assistant for the Grav page editor. Discover and insert internal links by reviewing scored, grouped phrase suggestions with surrounding context.
icon: sitemap
author:
  name: jonata
  email: jonata@jonata.org
  url: https://github.com/jonata
homepage: https://github.com/jonata/grav-plugin-smart-interlinker
keywords: admin, editor, seo, interlink, internal-links, backlinks, content, linking
bugs: https://github.com/jonata/grav-plugin-smart-interlinker/issues
docs: https://github.com/jonata/grav-plugin-smart-interlinker/blob/main/README.md
license: MIT

dependencies:
  - { name: grav, version: '>=1.7.0' }
  - { name: admin, version: '>=1.10.0' }

form:
  validation: strict
  fields:
    enabled:
      type: toggle
      label: Plugin status
      highlight: 1
      default: 0
      options:
        1: Enabled
        0: Disabled
      validate:
        type: bool

    keyword_fields:
      type: selectize
      size: large
      label: Additional keyword fields (optional)
      help: "Pick (or type) front-matter field names to treat as extra sources of link-target phrases. Phrases generated from these fields are matched against the source content the same way titles are. Leave empty to use the page title only."
      classes: fancy
      selectize:
        create: true
        plugins:
          - remove_button
      default: []
      options:
        focus_keyword: focus_keyword
        keywords: keywords
        seo_title: seo_title
        meta_title: meta_title
        meta_description: meta_description
        aliases: aliases
        tags: tags

    min_phrase_words:
      type: range
      label: Minimum phrase length (words)
      help: "Skip target-title phrases shorter than this. 2 is the recommended default — single words generate too much noise."
      default: 2
      min: 1
      max: 5
      step: 1

    ignored_terms:
      type: array
      label: Ignored terms
      help: "Words to treat like stopwords for phrase generation. Add site-generic words (e.g. 'linux', 'tutorial') so phrases made entirely of these are skipped. One per row."
      value_only: true

    match_threshold:
      type: range
      label: Backend confidence threshold (%)
      help: "Server-side cutoff. Matches below this coverage are never returned. Leave at 0 to let the in-modal slider be the only filter."
      default: 0
      min: 0
      max: 100
      step: 5

    context_length:
      type: range
      label: Context length (chars)
      help: "Number of characters to show before and after the matched phrase"
      default: 80
      min: 20
      max: 300
      step: 10

    skip_headings:
      type: toggle
      label: Skip Markdown headings
      help: "When enabled, phrases that only appear inside Markdown headings (#, ##, ###...) are excluded from suggestions. Disable this if you want to receive link suggestions for words that appear inside headings."
      highlight: 1
      default: 1
      options:
        1: Enabled
        0: Disabled
      validate:
        type: bool

    taxonomy_routes:
      type: array
      label: Taxonomy routes
      help: |
        Map taxonomy keys (left) to URL templates (right) to surface taxonomy listings as link suggestions. Use {value} as the placeholder for the taxonomy value (URL-encoded automatically). Example — tag → /tags/{value} produces /tags/Ubuntu when an article tagged tag: Ubuntu is found.
      placeholder_key: 'taxonomy key (e.g. tag)'
      placeholder_value: 'URL template with {value}'
